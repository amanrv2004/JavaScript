<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
</head>
<body style="background-color: black;color: white; font-size:20px; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div id="parent">
        <h1>Love Calculator</h1>
        <form action="" style="display: grid; justify-content: center; ">
            <label for="Boy">Boy Name</label>
            <input type="text" id="Boy" name="Boy" required>
            <label for="Girl">Girl Name</label>
            <input type="text" id="Girl" name="Girl" required>
            
            <button type="submit" style="margin-top: 20px;" >Calculate</button>
            <h2>Result: </h2>
        </form>

        <script src="./index.js"></script>
    </div>
</body>
</html>
