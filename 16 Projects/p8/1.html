<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <style>
        .circle{
    height: 70px;
    width: 70px;
    display: flex;
    border-radius: 50%;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    animation: grow 5s forwards;
    position:absolute;
}

@keyframes grow{
    0%{
       transform: scale(1);
       opacity: 1;
       font-size: 10px;
    }
    100%{
       transform: scale(4);
       opacity: 0;
       font-size: 40px;
    }
}
    </style>
</head>
<body style="background-color: black;color: white; font-size:20px; display: flex; justify-content: center; align-items: center; height: 100vh; position: relative;">

    
    <script >
        const body = document.querySelector('body');

body.addEventListener('click',(e)=>{
    console.log(e.clientX,e.clientY);

    
    const circleElement = document.createElement('div')
    circleElement.classList.add('circle');
    circleElement.textContent = "Hi";

    const color = ['red','blue','orange','pink','purple','green'];
    circleElement.style.backgroundColor = color[Math.floor(Math.random()*6)];


    circleElement.style.top = `${e.clientY-25}px`;
    circleElement.style.left = `${e.clientX-25}px`;


    body.append(circleElement);
    console.log(body);
    setTimeout(()=>{
        circleElement.remove();
    },5000);
})
    </script>
</body>
</html>
